<!doctype html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>رزرو تور و آژانس مسافرتی</title>
  <link rel="icon" type="image/x-icon" href="assets/img/favicon.png">
  <link href="assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/animation.css" rel="stylesheet">
  <link href="assets/css/dropzone.min.css" rel="stylesheet">
  <link href="assets/css/flatpickr.min.css" rel="stylesheet">
  <link href="assets/css/flickity.min.css" rel="stylesheet">
  <link href="assets/css/lightbox.min.css" rel="stylesheet">
  <link href="assets/css/magnifypopup.css" rel="stylesheet">
  <link href="assets/css/select2.min.css" rel="stylesheet">
  <link href="assets/css/rangeSlider.min.css" rel="stylesheet">
  <link href="assets/css/prism.css" rel="stylesheet">
  <link href="assets/css/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/fontawesome.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">

  <script src="./assets/js/vue.global.js"></script>
</head>

<body class="bg-light">
	<div id="preloader">
		<div class="preloader"><span></span><span></span></div>
	</div>
	<div id="main-wrapper">
		<section class="py-5">
			<div class="container">
				<div class="row justify-content-center align-items-center m-auto">
					<div class="col-xl-10 col-lg-11 col-12">
						<div class="bg-mode card shadow-sm rounded-3 overflow-hidden">
							<div class="row g-0">
								<div class="col-lg-6 d-flex align-items-center order-2 order-lg-1">
									<div class="p-3 p-lg-5">
										<img src="assets/img/login.svg" class="img-fluid" alt="">
									</div>
									<div class="vr opacity-1 d-none d-lg-block"></div>
								</div>

								<div class="col-lg-6 order-1">
									<div class="p-3 p-sm-4 p-md-5">
										<a href="index.html">
											<img class="img-fluid mb-4" src="assets/img/logo-icon.png" width="70" alt="logo">
										</a>
										<h1 class="mb-2 fs-2">خوش آمدی!</h1>
										<p class="mb-0">آیا هنوز ثبت نام نکرده اید؟<a href="signup.html" class="fw-medium text-primary"> ثبت نام</a></p>

										<div id="app">
											<form class="mt-4 text-start" @submit.prevent="handleSubmit">
												<div class="form py-4">
													<div class="form-floating mb-4">
														<input type="text" class="form-control" placeholder="09xxxxxxxxx" v-model="form.mobile" required>
														<label>شماره موبایل</label>
													</div>
													<div class="form-floating mb-4">
														<input type="password" class="form-control" id="password-field" name="password" placeholder="Password" v-model="form.password" required>
														<label>رمز عبور</label>
														<span class="toggle-password position-absolute top-50 start-0 translate-middle-y ms-3 fa-regular fa-eye"></span>
													</div>
													<div class="form-group">
														<button type="submit" class="btn btn-primary full-width btn-lg">ورود</button>
													</div>
													<div class="modal-flex-item d-flex align-items-center justify-content-between mb-3">
														<div class="modal-flex-first">
															<div class="form-check form-check-inline">
																<input class="form-check-input" type="checkbox" id="savepassword" v-model="form.rememberMe">
																<label class="form-check-label" for="savepassword">مرا به خاطر بسپار</label>
															</div>
														</div>
														<div class="modal-flex-last">
															<a href="404.html" class="text-primary fw-medium">رمز خود را فراموش کرده اید؟</a>
														</div>
													</div>
												</div>
												<div class="text-primary-hover mt-3 text-center"> 2026 کلیه حقوق این سایت محفوظ است. </div>
											</form>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</section>
	</div>

	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/popper.min.js"></script>
	<script src="assets/js/bootstrap.min.js"></script>
	<script src="assets/js/dropzone.min.js"></script>
	<script src="assets/js/flatpickr.js"></script>
	<script src="assets/js/flickity.pkgd.min.js"></script>
	<script src="assets/js/lightbox.min.js"></script>
	<script src="assets/js/rangeslider.js"></script>
	<script src="assets/js/select2.min.js"></script>
	<script src="assets/js/counterup.min.js"></script>
	<script src="assets/js/prism.js"></script>
	<script src="assets/js/custom.js"></script>

	<script>
		const { createApp } = Vue;

		createApp({
			data() {
				return {
					form: {
						mobile: '',
						password: '',
						rememberMe: false
					}
				};
			},
			methods: {
				async handleSubmit() {
					const { mobile, password } = this.form;
					const mobileRegex = /^09[0-9]{9}$/;
					if (!mobileRegex.test(mobile)) {
						alert('شماره موبایل معتبر نیست. (مثال: 09123456789)');
						return;
					}
					if (password.length < 8) {
						alert('رمز عبور باید حداقل ۸ کاراکتر باشد.');
						return;
					}
					try {
						const body = new URLSearchParams({
							username: mobile,
							password: password,
							grant_type: 'password'
						});
						const response = await fetch('http://127.0.0.1:8000/auth/login', {
							method: 'POST',
							headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
							body: body.toString()
						});
						const responseData = await response.json();
						if (!response.ok) {
							if (Array.isArray(responseData.detail)) {
								const msgs = responseData.detail.map(e => `${e.loc[1]}: ${e.msg}`).join('\n');
								alert('خطا:\n' + msgs);
							} else {
								alert('خطا: ' + (responseData.detail || 'خطای ناشناخته'));
							}
							return;
						}

						localStorage.setItem('token', responseData.access_token);
						window.location.href = 'home-flight.html';

					} catch (error) {
						alert('خطا:\n' + error.message);
					}
				}
			}
		}).mount('#app');
	</script>
</body>
</html>
