    <script>
  const { createApp } = Vue;

  createApp({
    data() {
      return {
        apiBaseUrl: 'http://localhost:5041/api',
        flight: null,
        flightId: null,
        userId: null,
        passengerCount: 1,
        passengers: [],
        loading: true,
        submitting: false,
        loadError: '',
        submitError: '',
        passengerKey: 0,
        today: new Date().toISOString().slice(0, 10)
      };
    },

    computed: {
      ticketPrice() {
        return Number(this.flight?.price) || 0;
      },



      totalAmount() {
        return this.ticketPrice * this.passengerCount;
      },

      maxPassengers() {
        const availableSeats = Number(this.flight?.availableSeats) || 0;
        return Math.min(5, availableSeats);
      },

      canSubmit() {
        return (
          this.flight &&
          this.maxPassengers > 0 &&
          this.passengers.length === this.passengerCount
        );
      }
    },

    methods: {
      
      decodeJwtPayload(token) {
        try {
          const parts = token.split('.');

          if (parts.length !== 3) {
            return null;
          }

          let base64 = parts[1]
            .replace(/-/g, '+')
            .replace(/_/g, '/');

          base64 += '='.repeat((4 - base64.length % 4) % 4);

          const binary = atob(base64);
          const bytes = Uint8Array.from(
            binary,
            character => character.charCodeAt(0)
          );

          return JSON.parse(new TextDecoder().decode(bytes));
        } catch (error) {
          console.error('JWT decode error:', error);
          return null;
        }
      },

      getUserIdFromToken() {
        const token = localStorage.getItem('token');

        if (!token) {
          return null;
        }

        const payload = this.decodeJwtPayload(token);

        if (!payload) {
          return null;
        }

        if (payload.exp && Date.now() >= Number(payload.exp) * 1000) {
          localStorage.removeItem('token');
          return null;
        }

        const userId = Number(payload.user_id);

        return Number.isInteger(userId) && userId > 0
          ? userId
          : null;
      },

      getStoredFlightId() {
        const directFlightId = Number(
          sessionStorage.getItem('selectedFlightId') ||
          sessionStorage.getItem('flightId')
        );

        if (Number.isInteger(directFlightId) && directFlightId > 0) {
          return directFlightId;
        }

        try {
          const selectedFlight = JSON.parse(
            sessionStorage.getItem('selectedFlight')
          );

          const storedFlightId = Number(selectedFlight?.id);

          return Number.isInteger(storedFlightId) && storedFlightId > 0
            ? storedFlightId
            : null;
        } catch (error) {
          return null;
        }
      },

      createEmptyPassenger() {
        this.passengerKey += 1;

        return {
          key: this.passengerKey,
          firstName: '',
          lastName: '',
          nationalCode: '',
          birthDate: '',
          gender: ''
        };
      },

      updatePassengerCount() {
        const requestedCount = Number(this.passengerCount);

        if (
          !Number.isInteger(requestedCount) ||
          requestedCount < 1 ||
          requestedCount > this.maxPassengers
        ) {
          this.passengerCount = 1;
        }

        while (this.passengers.length < this.passengerCount) {
          this.passengers.push(this.createEmptyPassenger());
        }

        if (this.passengers.length > this.passengerCount) {
          this.passengers.splice(this.passengerCount);
        }

        this.submitError = '';
      },

      normalizeNationalCode(passenger) {
        passenger.nationalCode = this.toEnglishDigits(
          passenger.nationalCode
        )
          .replace(/\D/g, '')
          .slice(0, 10);
      },

      toEnglishDigits(value) {
        return String(value || '')
          .replace(/[۰-۹]/g, digit =>
            String('۰۱۲۳۴۵۶۷۸۹'.indexOf(digit))
          )
          .replace(/[٠-٩]/g, digit =>
            String('٠١٢٣٤٥٦٧٨٩'.indexOf(digit))
          );
      },

      isValidNationalCode(nationalCode) {
        const code = this.toEnglishDigits(nationalCode);

        if (!/^\d{10}$/.test(code)) {
          return false;
        }

        if (/^(\d)\1{9}$/.test(code)) {
          return false;
        }

        const checkDigit = Number(code[9]);
        let sum = 0;

        for (let index = 0; index < 9; index += 1) {
          sum += Number(code[index]) * (10 - index);
        }

        const remainder = sum % 11;
        const expectedCheckDigit =
          remainder < 2 ? remainder : 11 - remainder;

        return checkDigit === expectedCheckDigit;
      },
      validatePassengers() {
        const nationalCodes = new Set();

        for (let index = 0; index < this.passengers.length; index += 1) {
          const passenger = this.passengers[index];
          const passengerNumber = index + 1;

          if (!passenger.firstName.trim()) {
            return `نام مسافر ${passengerNumber} را وارد کنید.`;
          }

          if (!passenger.lastName.trim()) {
            return `نام خانوادگی مسافر ${passengerNumber} را وارد کنید.`;
          }

          if (!passenger.birthDate) {
            return `تاریخ تولد مسافر ${passengerNumber} را انتخاب کنید.`;
          }

          if (passenger.birthDate > this.today) {
            return `تاریخ تولد مسافر ${passengerNumber} نمی‌تواند در آینده باشد.`;
          }

          if (!this.isValidNationalCode(passenger.nationalCode)) {
            return `کد ملی مسافر ${passengerNumber} معتبر نیست.`;
          }

          if (nationalCodes.has(passenger.nationalCode)) {
            return `کد ملی مسافر ${passengerNumber} تکراری است.`;
          }

          nationalCodes.add(passenger.nationalCode);

          if (passenger.gender !== 0 && passenger.gender !== 1) {
            return `جنسیت مسافر ${passengerNumber} را انتخاب کنید.`;
          }
        }

        return '';
      },

      formatPrice(amount) {
        return new Intl.NumberFormat('fa-IR').format(Number(amount) || 0);
      },

      async loadBooking() {
        this.loading = true;
        this.loadError = '';
        this.submitError = '';
        this.flight = null;

        this.userId = this.getUserIdFromToken();

        if (!this.userId) {
          this.loadError =
            'اطلاعات ورود کاربر پیدا نشد یا اعتبار توکن تمام شده است. لطفاً دوباره وارد شوید.';
          this.loading = false;
          return;
        }

        this.flightId = this.getStoredFlightId();

        if (!this.flightId) {
          this.loadError =
            'شناسه پرواز پیدا نشد. لطفاً به صفحه پروازها برگردید و پرواز را دوباره انتخاب کنید.';
          this.loading = false;
          return;
        }

        try {
          const response = await fetch(
            `${this.apiBaseUrl}/Flights/${this.flightId}`,
            {
              headers: {
                Accept: 'application/json'
              }
            }
          );

          if (!response.ok) {
            const errorText = await response.text();

            throw new Error(
              errorText || `خطای دریافت پرواز با کد ${response.status}`
            );
          }

          const flight = await response.json();

          if (!flight || Number(flight.id) !== this.flightId) {
            throw new Error('اطلاعات پرواز دریافت‌شده معتبر نیست.');
          }

          this.flight = flight;

          if (this.maxPassengers < 1) {
            throw new Error('ظرفیت این پرواز تکمیل شده است.');
          }

          this.passengerCount = 1;
          this.passengers = [this.createEmptyPassenger()];
        } catch (error) {
          this.flight = null;
          this.loadError =
            error.message || 'دریافت اطلاعات پرواز با خطا مواجه شد.';
        } finally {
          this.loading = false;
        }
      },

      async submitBooking() {
        if (this.submitting) {
          return;
        }

        this.submitError = '';

        const validationError = this.validatePassengers();

        if (validationError) {
          this.submitError = validationError;
          return;
        }

        const token = localStorage.getItem('token');
        this.userId = this.getUserIdFromToken();

        if (!token || !this.userId) {
          this.submitError =
            'نشست کاربری منقضی شده است. لطفاً دوباره وارد شوید.';
          return;
        }

        const requestBody = {
          userId: this.userId,
          flightId: this.flightId,
          passengers: this.passengers.map(passenger => ({
            firstName: passenger.firstName.trim(),
            lastName: passenger.lastName.trim(),
            nationalCode: passenger.nationalCode,
            birthDate: passenger.birthDate,
            gender: Number(passenger.gender)
          }))
        };

        this.submitting = true;

        try {
          const response = await fetch(
            `${this.apiBaseUrl}/Bookings`,
            {
              method: 'POST',
              headers: {
                Accept: '*/*',
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`
              },
              body: JSON.stringify(requestBody)
            }
          );

          if (!response.ok) {
            const errorText = await response.text();

            throw new Error(
              errorText || `ثبت رزرو با خطای ${response.status} مواجه شد.`
            );
          }

          const completedBooking = {
            userId: this.userId,
            flightId: this.flightId,
            flightNumber: this.flight.flightNumber,
            passengerCount: this.passengers.length,
            passengers: requestBody.passengers,
            ticketPrice: this.ticketPrice,
            totalAmount: this.totalAmount,
            completedAt: new Date().toISOString()
          };

          sessionStorage.setItem(
            'completedBooking',
            JSON.stringify(completedBooking)
          );

          sessionStorage.setItem('bookingCompleted', 'true');

          window.location.href = 'bookingpage-success.html';
        } catch (error) {
          this.submitError =
            error.message || 'ثبت رزرو انجام نشد. دوباره تلاش کنید.';
        } finally {
          this.submitting = false;
        }
      }
    },

    mounted() {
      this.loadBooking();
    }
  }).mount('#bookingApp');
    </script>
