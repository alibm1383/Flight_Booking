name: Safari FastAPI CI Tests and Sonar Scan

on:
  push:
    paths:
      - 'Safari_Backend-fastapi/**'
      - 'backend_asp.net/**'
      - '.github/workflows/**'        
  pull_request:
    branches:
      - main
    paths:
      - 'Safari_Backend-fastapi/**'
      - 'backend_asp.net/**'
      - '.github/workflows/**'

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./Safari_Backend-fastapi

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Create Test .env File
        run: |
          echo "DB_USER=myuser" > Safari_Backend/.env
          echo "DB_PASSWORD=mypassword" >> Safari_Backend/.env
          echo "DB_HOST=localhost" >> Safari_Backend/.env
          echo "DB_PORT=5432" >> Safari_Backend/.env
          echo "DB_NAME=testdb" >> Safari_Backend/.env
          echo "SECRET_KEY=test_secret_key" >> Safari_Backend/.env
          echo "ALGORITHM=HS256" >> Safari_Backend/.env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> Safari_Backend/.env

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: pytest --md test_report.md

  sonar-dotnet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17 (Required for Sonar)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build and Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # شروع اسکن (اتصال به SonarCloud با Organization و Project Key)
          dotnet sonarscanner begin /k:"alibm1383_Flight_Booking" /o:"alibm1383" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io"
          
          # بیلد کردن کل سلوشن برای اینکه سونا کیوب همه پروژه‌های داخلش رو ببینه
          dotnet build backend_asp.net/FlightBooking.sln
          
          # پایان اسکن و ارسال گزارش
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"