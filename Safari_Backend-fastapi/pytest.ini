[pytest]
# Enable logs in terminal
log_cli = true

# Minimum log level to display (INFO, WARNING, ERROR, DEBUG)
log_cli_level = INFO

# Log format (timestamp, level, message, filename and line number)
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Automatically add useful flags to the pytest command
addopts = -v -s